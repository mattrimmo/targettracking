<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listen Up — Long Term Target Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #101014;
    --panel: #16161b;
    --surface: #1b1b21;
    --surface2: #212129;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.13);
    --text: #f2f2f4;
    --muted: #9a9aa3;
    --faint: #55555f;
    --accent: #5b7cfa;
    --accent-hover: #7292ff;
    --up: #34d399;
    --down: #f87171;
    --gold: #e8b95c;
    --silver: #b9bcc6;
    --bronze: #c98a54;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.5; }
  .shell { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
  .side { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; overflow-y: auto; }
  .side-top { padding: 22px 20px 16px; border-bottom: 1px solid var(--border); }
  .logo { height: 42px; filter: invert(1); display: block; margin-bottom: 12px; opacity: 0.95; }
  .logo-fallback { display:none; font-family: var(--sans); font-weight: 700; font-size: 17px; letter-spacing: -0.01em; margin-bottom: 12px; }
  .logo-fallback .bar { display:inline-block; width:16px; height:4px; background:var(--accent); border-radius:2px; margin-right:8px; vertical-align:middle; }
  .side-title { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: -0.005em; }
  .side-sub { font-size: 11px; color: var(--faint); margin-top: 2px; }
  .side-block { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .block-label { font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); margin-bottom: 9px; display:flex; justify-content:space-between; align-items:center; }
  .block-label button.link { background:none; border:none; color:var(--faint); font-size: 11px; cursor:pointer; text-transform:none; letter-spacing:0; font-weight:500; }
  .block-label button.link:hover { color: var(--accent); }
  input[type=text], input[type=password] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 9px 11px; color: var(--text); font-family: var(--sans);
    font-size: 13.5px; outline: none; transition: border-color 0.15s;
  }
  input[type=text]:focus, input[type=password]:focus { border-color: var(--accent); }
  input::placeholder { color: var(--faint); }
  .field-label { font-size: 10px; color: var(--faint); letter-spacing: 0.05em; text-transform: uppercase; display:block; margin: 9px 0 4px; font-weight: 600; }
  .field-label:first-child { margin-top: 0; }
  .btn-accent {
    display: block; width: 100%; margin-top: 9px;
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 9px; font-family: var(--sans); font-size: 13.5px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-accent:hover { background: #6f8bff; }
  .btn-accent:disabled { background: var(--surface2); color: var(--faint); cursor: not-allowed; }
  .notice { font-size: 12.5px; margin-top: 8px; padding: 7px 10px; border-radius: 7px; display: none; line-height: 1.4; }
  .notice.show { display: block; }
  .notice.loading { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border2); }
  .notice.error   { background: rgba(248,113,113,0.1); color: var(--down); border: 1px solid rgba(248,113,113,0.2); }
  .notice.success { background: rgba(52,211,153,0.08); color: var(--up); border: 1px solid rgba(52,211,153,0.18); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; width: 10px; height: 10px; border: 2px solid rgba(91,124,250,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
  .results { display: flex; flex-direction: column; gap: 6px; margin-top: 9px; }
  .result-item { display: flex; align-items: center; gap: 9px; padding: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: border-color 0.12s, background 0.12s; }
  .result-item:hover { border-color: var(--accent); background: var(--surface2); }
  .result-art { width: 32px; height: 32px; border-radius: 5px; background: var(--surface2); object-fit: cover; flex-shrink: 0; }
  .result-name { font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .tracked-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; cursor: pointer; color: var(--muted); }
  .tracked-item:last-child { border-bottom: none; }
  .tracked-item:hover { color: var(--accent); }
  .tracked-item .rm { margin-left: auto; background: none; border: none; color: var(--faint); font-size: 16px; cursor: pointer; padding: 0 4px; flex-shrink:0; }
  .tracked-item .rm:hover { color: var(--down); }
  .debug-area { padding: 12px 20px 18px; margin-top: auto; border-top: 1px solid var(--border); }
  .debug-label { font-size: 10px; color: var(--faint); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; }
  .debug-clear { background: none; border: none; color: var(--faint); font-size: 10px; cursor: pointer; padding: 0; }
  #debugBox { font-size: 10px; color: var(--faint); font-family: var(--mono); background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 8px; height: 80px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; line-height: 1.5; }
  .main { display: flex; flex-direction: column; min-height: 100vh; }
  .main-header { padding: 24px 36px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .main-title { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  .main-sub { font-size: 12.5px; color: var(--faint); margin-top: 3px; }
  .content { padding: 24px 36px 40px; flex: 1; display: flex; flex-direction: column; gap: 20px; max-width: 1560px; width: 100%; margin: 0 auto; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--faint); text-align: center; padding: 40px; }
  .empty-icon { font-size: 38px; opacity: 0.2; }

  .track-card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 22px 24px; }
  .track-head { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; }
  .track-name { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; }
  .track-meta { font-size: 12px; color: var(--faint); margin-top: 4px; }
  .track-meta .live-tag { color: var(--accent); font-weight: 600; }

  .hero-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .hero-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
  .hero-label { font-size: 11.5px; color: var(--muted); font-weight: 600; letter-spacing: 0.03em; margin-bottom: 6px; }
  .hero-row { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .hero-num { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; }
  .pill { display: inline-flex; align-items: center; gap: 4px; font-size: 12.5px; font-weight: 600; padding: 3px 9px; border-radius: 99px; }
  .pill.up { color: var(--up); background: rgba(52,211,153,0.12); }
  .pill.down { color: var(--down); background: rgba(248,113,113,0.12); }
  .pill.flat { color: var(--faint); background: rgba(255,255,255,0.05); }

  .section { margin-bottom: 18px; }
  .section:last-child { margin-bottom: 0; }
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px; }
  .section-title { font-size: 12.5px; font-weight: 700; color: var(--text); }
  .section-count { font-size: 11.5px; color: var(--faint); }

  .supporter-row { display: flex; flex-wrap: wrap; gap: 10px; }
  .supporter { display: flex; align-items: center; gap: 9px; background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 8px 12px 8px 8px; }
  .supporter .ring { width: 30px; height: 30px; border-radius: 50%; display:flex; align-items:center; justify-content:center; font-size: 12px; font-weight: 700; flex-shrink:0; color: #14140f; }
  .supporter .ring.tier-1 { background: var(--gold); }
  .supporter .ring.tier-2 { background: var(--silver); }
  .supporter .ring.tier-3 { background: var(--bronze); }
  .supporter .name { font-size: 13px; font-weight: 600; }
  .supporter .followers { font-size: 11px; color: var(--muted); }
  .empty-note { font-size: 12.5px; color: var(--faint); padding: 10px 0; }

  .duo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
  @media (max-width: 980px) { .duo-grid { grid-template-columns: 1fr; } }

  .list-rows { display: flex; flex-direction: column; max-height: 320px; overflow-y: auto; padding-right: 4px; }
  .list-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .list-row:last-child { border-bottom: none; }
  .list-row .left { min-width: 0; flex: 1; display: flex; align-items: center; gap: 9px; }
  .row-art { width: 30px; height: 30px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
  .list-row .pname-wrap { min-width: 0; }
  .list-row .pname { font-size: 13.5px; font-weight: 500; color: var(--text); text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
  .list-row .pname:hover { color: var(--accent); }
  .list-row .curator { font-size: 11.5px; color: var(--faint); margin-top: 1px; }
  .list-row .followers { font-size: 12.5px; color: var(--muted); font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .tag-editorial { font-size: 10px; color: var(--faint); background: var(--surface2); padding: 1px 7px; border-radius: 99px; margin-left: 6px; }

  .track-art { width: 68px; height: 68px; border-radius: 12px; object-fit: cover; flex-shrink: 0; background: var(--surface2); box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
  .track-head { position: relative; z-index: 1; }
  .card-wash { position: absolute; inset: 0; border-radius: 16px; opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 0; }
  .track-card { position: relative; overflow: hidden; }
  .track-card > *:not(.card-wash) { position: relative; z-index: 1; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="side-top">
      <img id="logoImg" class="logo" src="" alt="Listen Up" onerror="this.style.display='none';document.getElementById('logoFallback').style.display='block'">
      <div id="logoFallback" class="logo-fallback"><span class="bar"></span>LISTEN UP</div>
      <div class="side-title">Long Term Target Tracking</div>
      <div class="side-sub">live editorial &amp; independent movement</div>
    </div>

    <div class="side-block">
      <div class="block-label">Settings <button class="link" onclick="toggleSettings()">edit</button></div>
      <div id="settingsForm" style="display:none;">
        <label class="field-label">GitHub owner/org</label>
        <input type="text" id="ghOwner" placeholder="e.g. mattrimmo">
        <label class="field-label">Repo name</label>
        <input type="text" id="ghRepo" placeholder="e.g. targettracking">
        <label class="field-label">GitHub token (write access to this repo)</label>
        <input type="password" id="ghToken" placeholder="paste token — kept in this browser only">
        <label class="field-label">Spotify Client ID</label>
        <input type="text" id="spId" placeholder="for searching tracks to add">
        <label class="field-label">Spotify Client Secret</label>
        <input type="password" id="spSecret" placeholder="for searching tracks to add">
        <button class="btn-accent" onclick="saveSettings()">Save</button>
      </div>
      <div id="settingsSummary" style="font-size:12px;color:var(--muted)"></div>
    </div>

    <div class="side-block">
      <div class="block-label">Add a track</div>
      <input type="text" id="q" placeholder="Search title/artist, or paste Spotify link">
      <button class="btn-accent" id="searchBtn" onclick="doSearch()">Search</button>
      <div class="notice" id="searchNotice"></div>
      <div class="results" id="results"></div>
    </div>

    <div class="side-block">
      <div class="block-label">Currently tracked <span id="trackedCount" style="font-size:12px;color:var(--faint)"></span></div>
      <div id="trackedList"></div>
    </div>

    <div class="side-block">
      <div class="block-label">Sync</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:2px;" id="lastSyncNote">—</div>
      <button class="btn-accent" onclick="checkLiveNow()" id="liveBtn">Check live now</button>
      <div class="notice" id="syncNotice"></div>
    </div>

    <div class="debug-area">
      <div class="debug-label"><span>Debug</span><button class="debug-clear" onclick="document.getElementById('debugBox').textContent=''">clear</button></div>
      <div id="debugBox"></div>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <div>
        <div class="main-title">Target Tracking</div>
        <div class="main-sub">Official week-on-week movement, refreshed every Wednesday</div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// SETTINGS (localStorage only — nothing here is committed to the repo)
// ─────────────────────────────────────────────────────────────────────────────
function getSettings() {
  return {
    owner:  localStorage.getItem('ltt_owner')  || '',
    repo:   localStorage.getItem('ltt_repo')   || '',
    token:  localStorage.getItem('ltt_token')  || '',
    spId:   localStorage.getItem('ltt_spid')   || '',
    spSecret: localStorage.getItem('ltt_spsecret') || '',
  };
}
function toggleSettings() {
  const f = document.getElementById('settingsForm');
  const s = getSettings();
  document.getElementById('ghOwner').value = s.owner;
  document.getElementById('ghRepo').value  = s.repo;
  document.getElementById('ghToken').value = s.token;
  document.getElementById('spId').value = s.spId;
  document.getElementById('spSecret').value = s.spSecret;
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}
function saveSettings() {
  localStorage.setItem('ltt_owner', document.getElementById('ghOwner').value.trim());
  localStorage.setItem('ltt_repo',  document.getElementById('ghRepo').value.trim());
  localStorage.setItem('ltt_token', document.getElementById('ghToken').value.trim());
  localStorage.setItem('ltt_spid', document.getElementById('spId').value.trim());
  localStorage.setItem('ltt_spsecret', document.getElementById('spSecret').value.trim());
  document.getElementById('settingsForm').style.display = 'none';
  renderSettingsSummary();
  dbg('Settings saved locally.');
}
function renderSettingsSummary() {
  const s = getSettings();
  document.getElementById('settingsSummary').textContent =
    (s.owner && s.repo) ? `${s.owner}/${s.repo}` : 'Not configured yet — click edit';
}
// ─────────────────────────────────────────────────────────────────────────────
// DEBUG / NOTICE HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function dbg(msg) {
  const box = document.getElementById('debugBox');
  const ts  = new Date().toTimeString().slice(0,8);
  box.textContent += ts + '  ' + msg + '\n';
  box.scrollTop = box.scrollHeight;
  console.log('[LTT]', msg);
}
function notice(id, text, type) {
  const el = document.getElementById(id);
  el.className = 'notice show ' + type;
  el.innerHTML = (type === 'loading' ? '<span class="spin"></span>' : '') + text;
}
function hideNotice(id) { document.getElementById(id).className = 'notice'; }
const fmtNum = n => (n == null ? '—' : Number(n).toLocaleString('en-GB'));
const trunc  = (s, n) => (s && s.length > n ? s.slice(0, n) + '…' : (s || ''));
function pill(d) {
  if (d === null || d === undefined) return '<span class="pill flat">first snapshot</span>';
  if (d > 0) return `<span class="pill up">▲ ${d}</span>`;
  if (d < 0) return `<span class="pill down">▼ ${Math.abs(d)}</span>`;
  return '<span class="pill flat">— no change</span>';
}
function initials(name) {
  return (name || '?').trim().split(/\s+/).slice(0,2).map(w => w[0]).join('').toUpperCase();
}
// ─────────────────────────────────────────────────────────────────────────────
// GITHUB API — read/write the shared data files + trigger the sync workflow
// ─────────────────────────────────────────────────────────────────────────────
async function ghApi(path, opts) {
  const s = getSettings();
  if (!s.owner || !s.repo || !s.token) throw new Error('Set up GitHub owner/repo/token in Settings first.');
  opts = opts || {};
  const res = await fetch('https://api.github.com/repos/' + s.owner + '/' + s.repo + path, {
    ...opts,
    headers: {
      'Authorization': 'token ' + s.token,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) {
    const body = await res.text().catch(() => '');
    throw new Error('GitHub API ' + res.status + ': ' + body.slice(0, 200));
  }
  return res.status === 204 ? null : res.json();
}
async function ghGetFile(path) {
  const d = await ghApi('/contents/' + path);
  const content = JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g, '')))));
  return { content, sha: d.sha };
}
async function ghPutFile(path, contentObj, sha, message) {
  const json = JSON.stringify(contentObj, null, 2) + '\n';
  const b64  = btoa(unescape(encodeURIComponent(json)));
  return ghApi('/contents/' + path, {
    method: 'PUT',
    body: JSON.stringify({ message, content: b64, sha })
  });
}
async function ghTriggerSync(official) {
  await ghApi('/actions/workflows/sync.yml/dispatches', {
    method: 'POST',
    body: JSON.stringify({ ref: 'main', inputs: { official: official ? 'true' : 'false' } })
  });
}
async function ghLatestRun() {
  const d = await ghApi('/actions/workflows/sync.yml/runs?per_page=1&event=workflow_dispatch');
  return d.workflow_runs && d.workflow_runs[0];
}
// ─────────────────────────────────────────────────────────────────────────────
// SPOTIFY — client credentials, browser-side (public catalogue only, low risk)
// ─────────────────────────────────────────────────────────────────────────────
let _spToken = null, _spExpAt = 0;
async function spToken() {
  const s = getSettings();
  if (!s.spId || !s.spSecret) throw new Error('Set Spotify Client ID/Secret in Settings to search for tracks.');
  if (_spToken && Date.now() < _spExpAt) return _spToken;
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: {
      'Authorization': 'Basic ' + btoa(s.spId + ':' + s.spSecret),
      'Content-Type': 'application/x-www-form-urlencoded'
    },
    body: 'grant_type=client_credentials'
  });
  if (!res.ok) throw new Error('Spotify auth failed ' + res.status);
  const data = await res.json();
  _spToken = data.access_token;
  _spExpAt = Date.now() + (data.expires_in - 30) * 1000;
  return _spToken;
}
async function spGet(path) {
  const tok = await spToken();
  const res = await fetch('https://api.spotify.com/v1' + path, { headers: { 'Authorization': 'Bearer ' + tok } });
  if (!res.ok) throw new Error('Spotify ' + res.status + ' on ' + path);
  return res.json();
}
// ─────────────────────────────────────────────────────────────────────────────
// SEARCH (to add a track)
// ─────────────────────────────────────────────────────────────────────────────
async function doSearch() {
  const raw = document.getElementById('q').value.trim();
  if (!raw) return;
  const btn = document.getElementById('searchBtn');
  btn.disabled = true; btn.textContent = 'Searching…';
  document.getElementById('results').innerHTML = '';
  notice('searchNotice', 'Searching Spotify…', 'loading');
  try {
    const trackMatch = raw.match(/open\.spotify\.com\/track\/([A-Za-z0-9]+)/);
    let items = [];
    if (trackMatch) {
      const t = await spGet('/tracks/' + trackMatch[1]);
      items = [t];
    } else {
      const d = await spGet('/search?q=' + encodeURIComponent(raw) + '&type=track&limit=6');
      items = d.tracks ? d.tracks.items : [];
    }
    hideNotice('searchNotice');
    if (!items.length) { notice('searchNotice', 'No results found.', 'error'); }
    const container = document.getElementById('results');
    items.forEach(t => {
      const img = t.album && t.album.images && t.album.images[2] ? t.album.images[2].url : (t.album && t.album.images && t.album.images[0] ? t.album.images[0].url : '');
      const el = document.createElement('div');
      el.className = 'result-item';
      el.innerHTML = (img ? `<img class="result-art" src="${img}">` : '<div class="result-art"></div>') +
        `<div style="flex:1;min-width:0;">
          <div class="result-name">${t.name}</div>
          <div class="result-sub">${t.artists.map(a=>a.name).join(' & ')}</div>
        </div>`;
      el.addEventListener('click', () => addTrack(t));
      container.appendChild(el);
    });
  } catch (e) {
    notice('searchNotice', e.message, 'error');
    dbg('SEARCH ERROR: ' + e.message);
  }
  btn.disabled = false; btn.textContent = 'Search';
}
// ─────────────────────────────────────────────────────────────────────────────
// ADD / REMOVE TRACKED TRACKS  (commits directly to tracked.json via GitHub API)
// ─────────────────────────────────────────────────────────────────────────────
async function addTrack(spotifyTrack) {
  const isrc = spotifyTrack.external_ids && spotifyTrack.external_ids.isrc;
  if (!isrc) { notice('searchNotice', 'No ISRC found for this track.', 'error'); return; }
  notice('searchNotice', 'Adding to tracked list…', 'loading');
  try {
    const { content, sha } = await ghGetFile('data/tracked.json');
    if (content.tracks.some(t => t.isrc === isrc)) {
      notice('searchNotice', 'Already tracked.', 'error');
      return;
    }
    content.tracks.push({
      isrc,
      artist: spotifyTrack.artists.map(a => a.name).join(' & '),
      track:  spotifyTrack.name,
      image:  (spotifyTrack.album && spotifyTrack.album.images && (spotifyTrack.album.images[1] || spotifyTrack.album.images[0]) || {}).url || null,
      added_at: new Date().toISOString().slice(0, 10)
    });
    await ghPutFile('data/tracked.json', content, sha, `Add track: ${spotifyTrack.artists[0].name} - ${spotifyTrack.name}`);
    notice('searchNotice', '✓ Added. Run "Check live now" to pull its first snapshot.', 'success');
    document.getElementById('results').innerHTML = '';
    document.getElementById('q').value = '';
    dbg('Added ' + isrc);
    setTimeout(loadAll, 1500);
  } catch (e) {
    notice('searchNotice', e.message, 'error');
    dbg('ADD ERROR: ' + e.message);
  }
}
async function removeTrack(isrc, label) {
  if (!confirm('Remove "' + label + '" from tracking? History is kept, it just stops updating.')) return;
  notice('syncNotice', 'Removing…', 'loading');
  try {
    const { content, sha } = await ghGetFile('data/tracked.json');
    content.tracks = content.tracks.filter(t => t.isrc !== isrc);
    await ghPutFile('data/tracked.json', content, sha, `Remove track: ${label}`);
    notice('syncNotice', '✓ Removed.', 'success');
    setTimeout(loadAll, 1500);
  } catch (e) {
    notice('syncNotice', e.message, 'error');
    dbg('REMOVE ERROR: ' + e.message);
  }
}
// ─────────────────────────────────────────────────────────────────────────────
// CHECK LIVE NOW — triggers the Actions workflow, polls until it finishes
// ─────────────────────────────────────────────────────────────────────────────
async function checkLiveNow() {
  const btn = document.getElementById('liveBtn');
  btn.disabled = true;
  notice('syncNotice', 'Triggering sync on GitHub Actions…', 'loading');
  try {
    await ghTriggerSync(false); // never touches the official weekly delta
    await new Promise(r => setTimeout(r, 4000)); // give the run a moment to register
    let run = await ghLatestRun();
    let tries = 0;
    while (run && run.status !== 'completed' && tries < 40) {
      notice('syncNotice', 'Running… (' + run.status + ')', 'loading');
      await new Promise(r => setTimeout(r, 5000));
      run = await ghLatestRun();
      tries++;
    }
    if (run && run.conclusion === 'success') {
      notice('syncNotice', 'Waiting for the page to rebuild…', 'loading');
      await new Promise(r => setTimeout(r, 15000)); // Pages rebuild delay
      notice('syncNotice', '✓ Synced.', 'success');
      loadAll();
    } else {
      notice('syncNotice', 'Run finished with status: ' + (run ? run.conclusion : 'unknown') + '. Check the Actions tab.', 'error');
    }
  } catch (e) {
    notice('syncNotice', e.message, 'error');
    dbg('SYNC ERROR: ' + e.message);
  }
  btn.disabled = false;
}
// ─────────────────────────────────────────────────────────────────────────────
// LOAD + RENDER
// ─────────────────────────────────────────────────────────────────────────────
async function fetchJson(path) {
  const res = await fetch('./' + path + '?t=' + Date.now());
  if (!res.ok) throw new Error('Could not load ' + path);
  return res.json();
}
function renderTrackedList(tracked) {
  const el = document.getElementById('trackedList');
  document.getElementById('trackedCount').textContent = '(' + tracked.tracks.length + ')';
  if (!tracked.tracks.length) { el.innerHTML = '<div style="font-size:12px;color:var(--faint);padding:6px 0;">Nothing tracked yet.</div>'; return; }
  el.innerHTML = '';
  tracked.tracks.forEach(t => {
    const row = document.createElement('div');
    row.className = 'tracked-item';
    const label = t.artist + ' - ' + t.track;
    row.innerHTML = `<span onclick="document.getElementById('card-${t.isrc}')?.scrollIntoView({behavior:'smooth'})">${trunc(label, 28)}</span>
      <button class="rm" title="Remove">×</button>`;
    row.querySelector('.rm').addEventListener('click', (e) => { e.stopPropagation(); removeTrack(t.isrc, label); });
    el.appendChild(row);
  });
}
function editorialListRows(list) {
  if (!list.length) return '<div class="empty-note">None currently.</div>';
  return '<div class="list-rows">' + list.map(p => `
    <div class="list-row">
      <div class="left">
        ${p.cover_url ? `<img class="row-art" src="${p.cover_url}">` : '<div class="row-art"></div>'}
        <div class="pname-wrap"><a class="pname" href="https://open.spotify.com/playlist/${p.spotify_id}" target="_blank" rel="noopener" title="${p.name}">${trunc(p.name, 30)}</a></div>
      </div>
      <div class="followers">${fmtNum(p.followers)}</div>
    </div>`).join('') + '</div>';
}
function independentListRows(list) {
  if (!list.length) return '<div class="empty-note">None currently.</div>';
  return '<div class="list-rows">' + list.map(p => `
    <div class="list-row">
      <div class="left">
        ${p.cover_url ? `<img class="row-art" src="${p.cover_url}">` : '<div class="row-art"></div>'}
        <div class="pname-wrap">
          <a class="pname" href="https://open.spotify.com/playlist/${p.spotify_id}" target="_blank" rel="noopener" title="${p.name}">${trunc(p.name, 24)}</a>
          <div class="curator">${trunc(p.owner_name || '—', 22)}</div>
        </div>
      </div>
      <div class="followers">${fmtNum(p.followers)}</div>
    </div>`).join('') + '</div>';
}
function supporterRow(list) {
  if (!list.length) return '<div class="empty-note">No matches from your master curator list yet — check "All independent placements" below, or add curators to data/curators.json.</div>';
  return '<div class="supporter-row">' + list.map(p => `
    <div class="supporter" title="${p.owner_name} — Tier ${p.tier}${p.notes ? ' — ' + p.notes : ''}">
      <div class="ring tier-${p.tier}">${initials(p.owner_name)}</div>
      <div>
        <div class="name">${trunc(p.owner_name, 20)}</div>
        <div class="followers">${fmtNum(p.followers)} followers</div>
      </div>
    </div>`).join('') + '</div>';
}
function renderCards(tracked, history) {
  const content = document.getElementById('content');
  if (!tracked.tracks.length) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">◎</div><div>Nothing tracked yet.<br>Search for a track on the left to start following it.</div></div>`;
    return;
  }
  content.innerHTML = '';
  tracked.tracks.forEach(t => {
    const snaps = (history.snapshots && history.snapshots[t.isrc]) || [];
    const latest = snaps[snaps.length - 1];
    const card = document.createElement('div');
    card.className = 'track-card';
    card.id = 'card-' + t.isrc;
    if (!latest) {
      card.innerHTML = `
        <div class="track-head">
          <div><div class="track-name">${t.artist} - ${t.track}</div><div class="track-meta">${t.isrc} · added ${t.added_at}</div></div>
        </div>
        <div class="empty-note">No snapshot yet — click "Check live now" to pull the first one.</div>`;
      content.appendChild(card);
      return;
    }
    card.innerHTML = `
      <div class="card-wash" id="wash-${t.isrc}"></div>
      <div class="track-head">
        ${t.image ? `<img class="track-art" src="${t.image}" crossorigin="anonymous" id="art-${t.isrc}">` : ''}
        <div>
          <div class="track-name">${t.artist} - ${t.track}</div>
          <div class="track-meta">${t.isrc} · last synced ${latest.date}${latest.official ? '' : ' <span class="live-tag">· live check</span>'}</div>
        </div>
      </div>
      <div class="hero-stats">
        <div class="hero-stat">
          <div class="hero-label">Editorial playlists</div>
          <div class="hero-row"><span class="hero-num">${latest.editorial_count}</span>${pill(latest.editorial_count_delta)}</div>
        </div>
        <div class="hero-stat">
          <div class="hero-label">Independent followers</div>
          <div class="hero-row"><span class="hero-num">${fmtNum(latest.independent_followers_total)}</span>${pill(latest.independent_followers_delta)}</div>
        </div>
      </div>
      <div class="section">
        <div class="section-head"><span class="section-title">Key independent supporters</span><span class="section-count">${latest.key_supporters.length} matched</span></div>
        ${supporterRow(latest.key_supporters)}
      </div>
      <div class="duo-grid">
        <div class="section">
          <div class="section-head"><span class="section-title">Current editorial playlists</span><span class="section-count">${latest.editorial_count}</span></div>
          ${editorialListRows(latest.editorial_playlists)}
        </div>
        <div class="section">
          <div class="section-head"><span class="section-title">All independent placements</span><span class="section-count">${latest.independent_playlists.length}</span></div>
          ${independentListRows(latest.independent_playlists)}
        </div>
      </div>`;
    content.appendChild(card);
  });
}
function applyArtworkWash() {
  document.querySelectorAll('.track-art').forEach(img => {
    const isrc = img.id.replace('art-', '');
    const wash = document.getElementById('wash-' + isrc);
    if (!wash) return;
    const run = () => {
      try {
        const c = document.createElement('canvas');
        c.width = 12; c.height = 12;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, 12, 12);
        const data = ctx.getImageData(0, 0, 12, 12).data;
        let r=0,g=0,b=0,n=0;
        for (let i=0; i<data.length; i+=4) { r+=data[i]; g+=data[i+1]; b+=data[i+2]; n++; }
        r=Math.round(r/n); g=Math.round(g/n); b=Math.round(b/n);
        wash.style.background = `radial-gradient(ellipse 620px 240px at 60px 40px, rgba(${r},${g},${b},0.22), transparent 70%)`;
        wash.style.opacity = '1';
      } catch (e) { /* CORS or decode issue — just skip the wash for this card */ }
    };
    if (img.complete) run(); else img.addEventListener('load', run);
  });
}
async function loadAll() {
  try {
    const [tracked, history] = await Promise.all([fetchJson('data/tracked.json'), fetchJson('data/history.json')]);
    renderTrackedList(tracked);
    renderCards(tracked, history);
    applyArtworkWash();
    let latestDate = null;
    Object.values(history.snapshots || {}).forEach(list => {
      const d = list[list.length - 1];
      if (d && (!latestDate || d.date > latestDate)) latestDate = d.date;
    });
    document.getElementById('lastSyncNote').textContent = latestDate ? ('Last data: ' + latestDate) : 'No data yet';
    dbg('Loaded ' + tracked.tracks.length + ' tracked track(s).');
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-icon">!</div><div>${e.message}</div></div>`;
    dbg('LOAD ERROR: ' + e.message);
  }
}
// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.getElementById('logoImg').src = 'logo.png?v=' + Date.now();
renderSettingsSummary();
loadAll();
</script>
